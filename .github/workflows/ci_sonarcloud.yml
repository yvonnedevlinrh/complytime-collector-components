name: SonarQube Analysis

on:
  push:
    branches:
      - main

permissions:
  contents: none
  issues: none
  pull-requests: none

jobs:
  generate-coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run test
        run: task test
      - name: Merge coverage files
        run: |
          cat proofwatch/coverage.out > coverage.out
          tail -n +2 truthbeam/coverage.out >> coverage.out
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out

  sonarqube:
    name: SonarCloud Analysis
    permissions:
      contents: read
      pull-requests: read
    needs: generate-coverage
    uses: complytime/org-infra/.github/workflows/reusable_sonarqube.yml@393ab96ded06d41472526fb46ebe7a7188c422d3 # v0.2.0
    with:
      sonar_organization: ${{ vars.SONAR_ORGANIZATION }}
      sonar_project_key: ${{ vars.SONAR_PROJECT_KEY }}
      coverage_artifact_name: coverage
      coverage_file_path: coverage.out
      language_scanner_property: sonar.go.coverage.reportPaths
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      source_token: ${{ secrets.GITHUB_TOKEN }}
