name: Local CI
on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'

permissions:
  contents: none
  issues: none
  pull-requests: none
  actions: none
  security-events: none

env:
  GO_VERSION: 1.25
  GOLANGCI_LINT_VERSION: v2.5
  WEAVER_VERSION: v0.21.2

jobs:
  detect-modules:
    runs-on: ubuntu-latest
    outputs:
      modules: "${{ steps.set-modules.outputs.modules }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - id: setup-workspace
        run: task workspace
      - id: set-modules
        run: echo "modules=$(go list -m -json | jq -s '.' | jq -c '[.[].Dir]')" >> "${GITHUB_OUTPUT}"

  golangci-lint:
    needs: detect-modules
    runs-on: ubuntu-latest
    strategy:
      matrix:
        modules: "${{ fromJSON(needs.detect-modules.outputs.modules) }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "${{ env.GO_VERSION }}"
      - name: golangci-lint "${{ matrix.modules }}"
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: "${{ env.GOLANGCI_LINT_VERSION }}"
          working-directory: "${{ matrix.modules }}"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run all tests
        run: task test

  weave-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install weaver
        run: |
          echo "Installing weaver ${{ env.WEAVER_VERSION }}"
          curl -fL -o /tmp/weaver.tar.xz "https://github.com/open-telemetry/weaver/releases/download/${{ env.WEAVER_VERSION }}/weaver-x86_64-unknown-linux-gnu.tar.xz"
          mkdir -p "${HOME}/bin"
          tar -xJf /tmp/weaver.tar.xz
          mv weaver-x86_64-unknown-linux-gnu/weaver "${HOME}/bin/weaver"
          chmod +x "${HOME}/bin/weaver"
          echo "${HOME}/bin" >> "${GITHUB_PATH}"
          rm -rf "weaver-x86_64-unknown-linux-gnu/"

      - name: Setup Go workspace
        run: task workspace

      - name: Run weaver check
        run: task codegen:weaver-check

      - name: Generate test OCSF and Gemara logs and validate with weaver live-check
        run: task codegen:weaver-semantic-check

  verify-codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install weaver
        run: |
          echo "Installing weaver ${{ env.WEAVER_VERSION }}"
          curl -fL -o /tmp/weaver.tar.xz "https://github.com/open-telemetry/weaver/releases/download/${{ env.WEAVER_VERSION }}/weaver-x86_64-unknown-linux-gnu.tar.xz"
          mkdir -p "${HOME}/bin"
          tar -xJf /tmp/weaver.tar.xz
          mv weaver-x86_64-unknown-linux-gnu/weaver "${HOME}/bin/weaver"
          chmod +x "${HOME}/bin/weaver"
          echo "${HOME}/bin" >> "${GITHUB_PATH}"
          rm -rf weaver-x86_64-unknown-linux-gnu/

      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.5.0

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Setup workspace
        run: task workspace

      - name: Install dependencies
        run: |
          for m in "./proofwatch" "./truthbeam"; do
            (cd "${m}" && go mod download)
          done

      - name: Run code generation
        run: |
          task codegen:api-codegen
          task codegen:weaver-codegen

      - name: Check for diffs
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "ERROR: Code generation produced diffs. Please run 'task codegen:api-codegen' and 'task codegen:weaver-codegen' and commit the changes."
            echo ""
            echo "Changes detected:"
            git status --porcelain
            echo ""
            echo "Diff:"
            git diff
            exit 1
          else
            echo "SUCCESS: No diffs detected. Code generation is up to date."
          fi
