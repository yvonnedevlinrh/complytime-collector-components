name: Local CI
on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions:
  contents: none
  issues: none
  pull-requests: none
  actions: none
  security-events: none

env:
  GO_VERSION: 1.26.4
  GOLANGCI_LINT_VERSION: v2.12
  WEAVER_VERSION: v0.21.2

jobs:
  detect-modules:
    runs-on: ubuntu-latest
    outputs:
      modules: "${{ steps.set-modules.outputs.modules }}"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
          repo-token: ${{ github.token }}

      - id: setup-workspace
        run: task workspace
      - id: set-modules
        run: |
          echo "modules=$(go work edit -json go.work | jq -c '[.Use[].DiskPath | select(. == "./proofwatch" or . == "./truthbeam")]')" >> "${GITHUB_OUTPUT}"

  detect-layers:
    name: Detect Integration Layers
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_storage: ${{ steps.filter.outputs.storage }}
      run_enrichment: ${{ steps.filter.outputs.enrichment }}
      layers: ${{ steps.build-matrix.outputs.layers }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            storage:
              - 'configs/collector-storage*.yaml'
              - 'tests/integration/storage/**'
            enrichment:
              - 'configs/collector-enrichment.yaml'
              - 'tests/integration/enrichment/**'
              - 'tests/integration/mock-compass/**'
            all:
              - 'truthbeam/**'
              - 'beacon-distro/**'
              - 'compose.yaml'
              - 'compose.ghcr.yaml'
              - 'configs/collector-base.yaml'
              - 'configs/loki*.yaml'
              - 'proofwatch/**'
              - 'tests/integration/helpers.go'
              - 'tests/integration/fixtures/**'
              - '.taskfiles/integration.yml'

      - name: Build layer list
        id: build-matrix
        env:
          ALL: ${{ steps.filter.outputs.all }}
          STORAGE: ${{ steps.filter.outputs.storage }}
          ENRICHMENT: ${{ steps.filter.outputs.enrichment }}
          EVENT: ${{ github.event_name }}
        run: |
          # Always run all layers on push to main (gates GHCR publish)
          if [ "$EVENT" = "push" ]; then
            echo 'layers=["base","storage","enrichment"]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Base always runs
          LAYERS='["base"'

          # Add storage if storage-specific or shared code changed
          if [ "$ALL" = "true" ] || [ "$STORAGE" = "true" ]; then
            LAYERS="${LAYERS},\"storage\""
          fi

          # Add enrichment if enrichment-specific or shared code changed
          if [ "$ALL" = "true" ] || [ "$ENRICHMENT" = "true" ]; then
            LAYERS="${LAYERS},\"enrichment\""
          fi

          LAYERS="${LAYERS}]"
          echo "layers=${LAYERS}" >> "$GITHUB_OUTPUT"
          echo "Layers to test: ${LAYERS}"

  golangci-lint:
    needs: detect-modules
    runs-on: ubuntu-latest
    strategy:
      matrix:
        modules: "${{ fromJSON(needs.detect-modules.outputs.modules) }}"
    env:
      # Each module is linted independently via the matrix; disable workspace
      # mode so golangci-lint does not pass -mod=mod (forbidden in workspace).
      GOWORK: "off"
      # VCS stamping is irrelevant for linting; disable it so golangci-lint
      # never shells out to git for build metadata.
      GOFLAGS: "-buildvcs=false"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: golangci-lint "${{ matrix.modules }}"
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: "${{ env.GOLANGCI_LINT_VERSION }}"
          working-directory: "${{ matrix.modules }}"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
          repo-token: ${{ github.token }}

      - name: Run all tests
        run: task test

  weave-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
          repo-token: ${{ github.token }}

      - name: Install weaver
        run: task tools:install-weaver

      - name: Setup Go workspace
        run: task workspace

      - name: Run weaver check
        run: task codegen:weaver-check

      - name: Generate test OCSF and Gemara logs and validate with weaver live-check
        run: task codegen:weaver-semantic-check

  verify-codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
          repo-token: ${{ github.token }}

      - name: Install weaver
        run: task tools:install-weaver

      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.5.0

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Setup workspace
        run: task workspace

      - name: Install dependencies
        run: |
          for m in "./proofwatch" "./truthbeam"; do
            (cd "${m}" && go mod download)
          done

      - name: Run code generation
        run: |
          task codegen:api-codegen
          task codegen:weaver-codegen

      - name: Check for diffs
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "ERROR: Code generation produced diffs. Please run 'task codegen:api-codegen' and 'task codegen:weaver-codegen' and commit the changes."
            echo ""
            echo "Changes detected:"
            git status --porcelain
            echo ""
            echo "Diff:"
            git diff
            exit 1
          else
            echo "SUCCESS: No diffs detected. Code generation is up to date."
          fi

  integration-test:
    runs-on: ubuntu-latest
    needs: [test, detect-layers]
    steps:
      # Reclaim disk space occupied by pre-installed software that the
      # integration tests do not need.  Container images (Loki, RustFS,
      # collector build stage) are large; freeing ~25 GB avoids "no space
      # left on device" failures during docker build / docker compose pull.
      - name: Free disk space
        run: |
          echo "=== Disk before cleanup ==="
          df -h /
          sudo rm -rf /usr/local/lib/android \
                      /usr/share/dotnet \
                      /opt/ghc \
                      /usr/local/share/boost \
                      /usr/local/.ghcup \
                      /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          echo "=== Disk after cleanup ==="
          df -h /

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
          repo-token: ${{ github.token }}

      - name: Setup workspace
        run: task workspace

      - name: Run integration tests
        env:
          LAYERS: ${{ needs.detect-layers.outputs.layers }}
          # Use docker compose (pre-installed on ubuntu-latest) instead of
          # podman-compose.  This avoids pip-installing podman-compose and
          # eliminates the VFS storage driver overhead that caused disk
          # exhaustion in the previous container-in-container setup.
          COMPOSE_CMD: "docker compose"
          # Use standard ports (matches ci_publish_ghcr.yml)
          WEBHOOK_PORT: "8088"
          LOKI_PORT: "3100"
          RUSTFS_PORT: "9000"
          COMPASS_PORT: "8081"
          CI: "true"
        run: |
          for layer in $(echo "$LAYERS" | jq -r '.[]'); do
            echo "::group::Integration test: ${layer}"
            task integration:test PROFILE="${layer}"
            echo "::endgroup::"
          done

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-test-results
          path: .test-output/integration/
          retention-days: 7

  publish-images:
    # Name suffix "(push to main only)": gated to push-on-default-branch by the if:
    # below, so it shows as a skipped node on every PR by design. The suffix marks
    # the gray node as intentional rather than a failed publish.
    name: Publish Container Images (push to main only)
    needs: [golangci-lint, test, weave-check, verify-codegen, integration-test]
    if: >-
      github.event_name == 'push'
      && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
      && needs.golangci-lint.result == 'success'
      && needs.test.result == 'success'
      && needs.weave-check.result == 'success'
      && needs.verify-codegen.result == 'success'
      && needs.integration-test.result == 'success'
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
      actions: read
      attestations: write
    uses: ./.github/workflows/ci_publish_ghcr.yml
    with:
      trigger_source: "Local CI"
    secrets: inherit
