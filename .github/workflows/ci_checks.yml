name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: none
  pull-requests: none

jobs:
  call_reusable_ci:
    name: Standardized CI
    uses: complytime/org-infra/.github/workflows/reusable_ci.yml@cfd981e757253218aefb37c91969c32827e5c4b1 # v0.2.1
    permissions:
      contents: read
      issues: read

  publish-images:
    name: Publish Container Images
    needs: [call_reusable_ci]
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && needs.call_reusable_ci.result == 'success'
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
      actions: read
      attestations: write
    uses: ./.github/workflows/ci_publish_ghcr.yml
    with:
      trigger_source: "CI"
