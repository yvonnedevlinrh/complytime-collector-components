# Promote to Quay Workflow
# =======================
# Tag push: promotes ghcr.io/org/image:sha-<commit> → quay.io/org/

name: Promote to Quay

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to create (e.g., v1.2.3)"
        type: string
        required: true
      source_sha:
        description: "Commit SHA of the image to promote (7+ chars)"
        type: string
        required: true
      force:
        description: "Overwrite existing tag (breaks immutability)"
        type: boolean
        default: false

permissions:
  contents: none

concurrency:
  group: release-quay-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  check-secrets:
    name: Verify Quay Credentials
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        env:
          HAS_USERNAME: ${{ secrets.QUAY_USERNAME != '' }}
          HAS_PASSWORD: ${{ secrets.QUAY_PASSWORD != '' }}
        run: |
          MISSING=()
          if [[ "$HAS_USERNAME" != "true" ]]; then
            MISSING+=("QUAY_USERNAME")
          fi
          if [[ "$HAS_PASSWORD" != "true" ]]; then
            MISSING+=("QUAY_PASSWORD")
          fi
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            echo ""
            echo "Configure these secrets in the repository or organization settings:"
            echo "  Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "Quay credentials configured."

  setup:
    name: Validate Release
    needs: check-secrets
    runs-on: ubuntu-latest
    outputs:
      source_tag: ${{ steps.vars.outputs.source_tag }}
      dest_tag: ${{ steps.vars.outputs.dest_tag }}
    steps:
      - name: Compute tags
        id: vars
        env:
          VERSION: ${{ inputs.version || github.ref_name }}
          FULL_SHA: ${{ inputs.source_sha || github.sha }}
        run: |
          # Validate SHA format (7-40 hex characters)
          if [[ ! "$FULL_SHA" =~ ^[a-f0-9]{7,40}$ ]]; then
            echo "::error::Invalid SHA format: $FULL_SHA (expected: 7-40 hex chars)"
            exit 1
          fi
          echo "source_tag=sha-${FULL_SHA}" >> "$GITHUB_OUTPUT"

          # Validate version format
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "::error::Invalid version format: $VERSION (expected: v1.2.3)"
            exit 1
          fi
          echo "dest_tag=${VERSION}" >> "$GITHUB_OUTPUT"

  verify-ghcr-image:
    name: Verify GHCR Image Exists
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: imjasonh/setup-crane@59c71e96a00b28651f10369ba3359a6d730740a0 # v0.6
      - name: Check image exists
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_TAG: ${{ needs.setup.outputs.source_tag }}
          GH_ACTOR: ${{ github.actor }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          IMAGE="ghcr.io/complytime/complybeacon-beacon-distro:${SOURCE_TAG}"
          echo "$TOKEN" | crane auth login ghcr.io -u "$GH_ACTOR" --password-stdin

          if crane manifest "$IMAGE" > /dev/null 2>&1; then
            echo "Image found: $IMAGE"
          else
            echo "::error::No GHCR image found for tag '${SOURCE_TAG}'."
            echo ""
            echo "The Quay promotion requires a signed image on GHCR, which is built"
            echo "by the publish workflow on pushes to main."
            echo ""
            echo "To fix this:"
            echo "  1. Check the publish workflows for the tagged commit:"
            echo "     ${REPO_URL}/actions/workflows/ci_publish_ghcr.yml"
            echo "  2. If the publish failed or was skipped, fix the issue and"
            echo "     re-run the publish workflow via workflow_dispatch."
            echo "  3. Once the GHCR image exists, re-run this workflow."
            exit 1
          fi

  tag-ghcr:
    name: Tag GHCR Images
    needs: [setup, verify-ghcr-image]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: imjasonh/setup-crane@59c71e96a00b28651f10369ba3359a6d730740a0 # v0.6
      - name: Tag GHCR images
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_TAG: ${{ needs.setup.outputs.source_tag }}
          DEST_TAG: ${{ needs.setup.outputs.dest_tag }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          echo "$TOKEN" | crane auth login ghcr.io -u "$GH_ACTOR" --password-stdin
          crane tag "ghcr.io/complytime/complybeacon-beacon-distro:${SOURCE_TAG}" "$DEST_TAG"

  promote-beacon-distro:
    name: Promote Beacon Distro
    needs: [setup, tag-ghcr]
    permissions:
      packages: read # pull source image from GHCR
      id-token: write # OIDC for keyless cosign signing on destination
    # upstream filename is misspelled (resuable); do not "fix" or the reference will 404
    uses: complytime/org-infra/.github/workflows/resuable_publish_quay.yml@11de1e8793c760ee62ea07cc43505be7ed11c151 # unstable
    with:
      source_registry: ghcr.io
      source_image: complytime/complybeacon-beacon-distro
      source_tag: ${{ needs.setup.outputs.source_tag }}
      dest_registry: quay.io
      dest_image: complytime/beacon-collector
      dest_tag: ${{ needs.setup.outputs.dest_tag }}
      additional_tags: latest
      include_sha_tags: true
      allowed_identity_regex: https://github.com/complytime/org-infra(/.*)?
      fail_if_dest_exists: ${{ inputs.force != true }}
    secrets:
      dest_username: ${{ secrets.QUAY_USERNAME }}
      dest_password: ${{ secrets.QUAY_PASSWORD }}
