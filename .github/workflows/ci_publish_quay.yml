# Promote to Quay Workflow
# =======================
# Tag push: promotes ghcr.io/org/image:sha-<commit> → quay.io/org/

name: Promote to Quay

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to create (e.g., v1.2.3)"
        type: string
        required: true
      source_sha:
        description: "Commit SHA of the image to promote (7+ chars)"
        type: string
        required: true
      force:
        description: "Overwrite existing tag (breaks immutability)"
        type: boolean
        default: false

permissions:
  contents: none

concurrency:
  group: release-quay-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  check-secrets:
    name: Verify Quay Credentials
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        env:
          HAS_USERNAME: ${{ secrets.QUAY_USERNAME != '' }}
          HAS_PASSWORD: ${{ secrets.QUAY_PASSWORD != '' }}
        run: |
          MISSING=()
          if [[ "$HAS_USERNAME" != "true" ]]; then
            MISSING+=("QUAY_USERNAME")
          fi
          if [[ "$HAS_PASSWORD" != "true" ]]; then
            MISSING+=("QUAY_PASSWORD")
          fi
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            echo ""
            echo "Configure these secrets in the repository or organization settings:"
            echo "  Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "Quay credentials configured."

  wait-for-ci:
    name: Wait for CI
    needs: check-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
    steps:
      - name: Wait for required checks on tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ inputs.source_sha || github.sha }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          REPO="${GITHUB_REPOSITORY}"
          TIMEOUT=3600  # 60 minutes
          INTERVAL=30
          ELAPSED=0

          # Validate SHA format before API call (defense in depth — setup job
          # also validates, but runs in parallel with this job)
          if [[ ! "$COMMIT_SHA" =~ ^[a-f0-9]{7,40}$ ]]; then
            echo "::error::Invalid SHA format: $COMMIT_SHA"
            exit 1
          fi

          # Resolve short SHA to full SHA (also validates the SHA exists)
          FULL_SHA=$(gh api "repos/${REPO}/commits/${COMMIT_SHA}" --jq '.sha') || {
            echo "::error::Commit ${COMMIT_SHA} not found in ${REPO}"
            exit 1
          }
          echo "Waiting for CI on commit ${FULL_SHA:0:7}..."

          # For workflow_dispatch the CI runs should already exist — don't wait
          # the full timeout if the commit simply never had any CI runs.
          IS_DISPATCH="${{ github.event_name == 'workflow_dispatch' }}"
          NO_RUNS_LIMIT=120  # 2 minutes before giving up on finding runs

          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            # Get the latest run per workflow for this commit, excluding ourselves.
            # group_by(workflow_id) + sort_by(run_started_at) handles re-runs: only
            # the most recent attempt of each workflow matters.
            LATEST_RUNS=$(gh api "repos/${REPO}/actions/runs?head_sha=${FULL_SHA}&per_page=100" \
              --jq "[.workflow_runs
                     | group_by(.workflow_id)
                     | .[]
                     | sort_by(.run_started_at)
                     | last
                     | select(.id != ${CURRENT_RUN_ID})]")

            TOTAL=$(echo "$LATEST_RUNS" | jq 'length')

            if [ "$TOTAL" -eq 0 ]; then
              if [ "$IS_DISPATCH" = "true" ] && [ "$ELAPSED" -ge "$NO_RUNS_LIMIT" ]; then
                echo "::error::No CI runs found for ${FULL_SHA:0:7} after ${NO_RUNS_LIMIT}s"
                echo "The commit may not have been pushed to main, or CI was never triggered."
                exit 1
              fi
              echo "No CI runs found yet for ${FULL_SHA:0:7} (${ELAPSED}s elapsed)"
              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
              continue
            fi

            PENDING=$(echo "$LATEST_RUNS" | jq '[.[] | select(.status != "completed")] | length')

            if [ "$PENDING" -gt 0 ]; then
              NAMES=$(echo "$LATEST_RUNS" | jq -r '.[] | select(.status != "completed") | .name' | paste -sd ', ')
              echo "  ${PENDING}/${TOTAL} still running: ${NAMES} (${ELAPSED}s elapsed)"
              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
              continue
            fi

            # All completed — check for failures
            FAILED=$(echo "$LATEST_RUNS" | jq '[.[] | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out")] | length')

            if [ "$FAILED" -gt 0 ]; then
              echo "::error::CI failed for ${FULL_SHA:0:7}:"
              echo "$LATEST_RUNS" | jq -r '.[] | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out") | "  \(.name): \(.conclusion) — \(.html_url)"'
              exit 1
            fi

            echo "All ${TOTAL} CI workflows passed for ${FULL_SHA:0:7}."
            exit 0
          done

          echo "::error::Timed out after ${TIMEOUT}s waiting for CI on ${FULL_SHA:0:7}"
          echo "Still running:"
          echo "$LATEST_RUNS" | jq -r '.[] | select(.status != "completed") | "  \(.name): \(.status) — \(.html_url)"'
          exit 1

  setup:
    name: Validate Release
    needs: check-secrets
    runs-on: ubuntu-latest
    outputs:
      source_tag: ${{ steps.vars.outputs.source_tag }}
      dest_tag: ${{ steps.vars.outputs.dest_tag }}
    steps:
      - name: Compute tags
        id: vars
        env:
          VERSION: ${{ inputs.version || github.ref_name }}
          FULL_SHA: ${{ inputs.source_sha || github.sha }}
        run: |
          # Validate SHA format (7-40 hex characters)
          if [[ ! "$FULL_SHA" =~ ^[a-f0-9]{7,40}$ ]]; then
            echo "::error::Invalid SHA format: $FULL_SHA (expected: 7-40 hex chars)"
            exit 1
          fi
          echo "source_tag=sha-${FULL_SHA}" >> "$GITHUB_OUTPUT"

          # Validate version format
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "::error::Invalid version format: $VERSION (expected: v1.2.3)"
            exit 1
          fi
          echo "dest_tag=${VERSION}" >> "$GITHUB_OUTPUT"

  verify-ghcr-image:
    name: Verify GHCR Image Exists
    needs: [setup, wait-for-ci]
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7
      - name: Check image exists
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_TAG: ${{ needs.setup.outputs.source_tag }}
          GH_ACTOR: ${{ github.actor }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          IMAGE="ghcr.io/complytime/complybeacon-beacon-distro:${SOURCE_TAG}"
          echo "$TOKEN" | crane auth login ghcr.io -u "$GH_ACTOR" --password-stdin

          if crane manifest "$IMAGE" > /dev/null 2>&1; then
            echo "Image found: $IMAGE"
          else
            echo "::error::No GHCR image found for tag '${SOURCE_TAG}'."
            echo ""
            echo "The Quay promotion requires a signed image on GHCR, which is built"
            echo "by the publish workflow on pushes to main."
            echo ""
            echo "To fix this:"
            echo "  1. Check the publish workflows for the tagged commit:"
            echo "     ${REPO_URL}/actions/workflows/ci_publish_ghcr.yml"
            echo "  2. If the publish failed or was skipped, fix the issue and"
            echo "     re-run the publish workflow via workflow_dispatch."
            echo "  3. Once the GHCR image exists, re-run this workflow."
            exit 1
          fi

  tag-ghcr:
    name: Tag GHCR Images
    needs: [setup, verify-ghcr-image]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7
      - name: Tag GHCR images
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_TAG: ${{ needs.setup.outputs.source_tag }}
          DEST_TAG: ${{ needs.setup.outputs.dest_tag }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          echo "$TOKEN" | crane auth login ghcr.io -u "$GH_ACTOR" --password-stdin
          crane tag "ghcr.io/complytime/complybeacon-beacon-distro:${SOURCE_TAG}" "$DEST_TAG"

  promote-beacon-distro:
    name: Promote Beacon Distro
    needs: [setup, tag-ghcr]
    permissions:
      packages: read # pull source image from GHCR
      id-token: write # OIDC for keyless cosign signing on destination
    uses: complytime/org-infra/.github/workflows/reusable_publish_quay.yml@638b2037394ca0f0b860a135c7c27dce75fd3c03 # v0.5.0
    with:
      source_registry: ghcr.io
      source_image: complytime/complybeacon-beacon-distro
      source_tag: ${{ needs.setup.outputs.source_tag }}
      dest_registry: quay.io
      dest_image: complytime/beacon-collector
      dest_tag: ${{ needs.setup.outputs.dest_tag }}
      additional_tags: latest
      include_sha_tags: false
      allowed_identity_regex: https://github.com/complytime/org-infra(/.*)?
      fail_if_dest_exists: ${{ inputs.force != true }}
    secrets:
      dest_username: ${{ secrets.QUAY_USERNAME }}
      dest_password: ${{ secrets.QUAY_PASSWORD }}
