# Publish Images Production Workflow
# ==================================
# Multi-stage security pipeline for building, scanning, and publishing container images.
# ONLY runs AFTER all CI tests pass to ensure image quality.
#
# Pipeline Flow:
#   build-beacon-distro → scan-image-beacon-distro → sign-beacon-distro → test-published-image
#                                                                        └→ promote-unstable-quay (main only, best-effort)
#
# Invocation:
#   - workflow_call: from ci_local.yml after all quality gates pass (push to main)
#   - schedule: monthly rebuilds for base image security updates
#   - workflow_dispatch: manual triggering
#
# Source vulnerability scanning is handled separately by ci_security.yml.
#
# Tagging Strategy:
#   - All builds: sha-<commit> (immutable, for traceability)
#
# NOTE: Scorecard flags 'write' permissions but these are REQUIRED for image publishing
# See: https://docs.github.com/en/actions/sharing-automations/reusing-workflows

name: Publish Images to GHCR

on:
  # Called by CI workflows after tests pass (production builds from main branch)
  workflow_call:
    inputs:
      trigger_source:
        description: "Source workflow that triggered this build (for observability)"
        type: string
        required: false
        default: "unknown"
      force_rebuild:
        description: "Force rebuild without cache (typically false for CI builds)"
        type: boolean
        required: false
        default: false
  schedule:
    - cron: "0 0 */30 * *" # Monthly rebuilds for base image security updates
  workflow_dispatch: # Allow manual triggering
    inputs:
      force_rebuild:
        description: "Force rebuild without cache"
        type: boolean
        required: false
        default: false

# Minimal permissions at workflow level; jobs declare what they need
permissions:
  contents: none
  packages: none
  id-token: none
  attestations: none
  security-events: none
  actions: none

# Prevent concurrent runs for the same ref (branch/tag)
# Production: don't cancel in-progress runs to avoid partial deployments
concurrency:
  group: publish-images-ghcr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 1: BUILD AND PUSH
  # ═══════════════════════════════════════════════════════════════════════════
  # Pre-build source scanning (OSV + Trivy) is handled by the ci_security.yml
  # workflow, which triggers on the same events. Duplicating it here added
  # redundant CI minutes without additional coverage.
  #
  # Org membership check (check-contributor) was removed together with the
  # standalone pull_request trigger. This workflow now only fires via
  # workflow_call (from ci_local.yml, which gates on push-to-main),
  # schedule, or workflow_dispatch — all trusted invocation paths.
  build-beacon-distro:
    name: Build Beacon Distro Image
    permissions:
      contents: read # checkout source for build
      packages: write # push image to GHCR
      id-token: write # OIDC for registry auth
      actions: read # access reusable workflow
      attestations: write # publish build provenance
    uses: complytime/org-infra/.github/workflows/reusable_publish_ghcr.yml@bbd7194995388f96dd28c0c0792d406c8a249140 # v0.4.0
    with:
      component_name: beacon-distro
      containerfile_path: beacon-distro/Containerfile.collector
      context_path: .
      image_name: complytime/complybeacon-beacon-distro
      image_description: ComplyBeacon Beacon Distro collector
      image_vendor: ComplyTime
      force_rebuild: ${{ inputs.force_rebuild || false }}
      allow_unprotected_ref: true # Allow workflow_dispatch on non-default branches
    # NOTE: Outputs from the reusable workflow (image, digest, image_ref, tags)
    # are automatically available to downstream jobs via needs.build-beacon-distro.outputs.*

  # ═══════════════════════════════════════════════════════════════════════════
  # QUAY CREDENTIAL CHECK (for unstable promotion)
  # ═══════════════════════════════════════════════════════════════════════════
  check-quay-secrets:
    name: Check Quay Credentials
    runs-on: ubuntu-latest
    permissions:
      contents: none
    outputs:
      has_quay_creds: ${{ steps.check.outputs.has_quay_creds }}
    steps:
      - name: Detect Quay credentials
        id: check
        env:
          HAS_USERNAME: ${{ secrets.QUAY_USERNAME != '' }}
          HAS_PASSWORD: ${{ secrets.QUAY_PASSWORD != '' }}
        run: |
          if [[ "$HAS_USERNAME" == "true" && "$HAS_PASSWORD" == "true" ]]; then
            echo "has_quay_creds=true" >> "$GITHUB_OUTPUT"
            echo "Quay credentials available."
          else
            echo "has_quay_creds=false" >> "$GITHUB_OUTPUT"
            echo "Quay credentials not configured — unstable promotion will be skipped."
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 2: POST-BUILD IMAGE SCANNING
  # ═══════════════════════════════════════════════════════════════════════════
  # Scans built images for OS package vulns and runtime deps.
  scan-image-beacon-distro:
    name: Scan Beacon Distro Image
    needs: [build-beacon-distro]
    # always() is required to work around actions/runner#2205: without it, if
    # any transitive dependency in the chain is skipped, GitHub Actions skips
    # this job without evaluating the if condition.
    if: >-
      always()
      && needs.build-beacon-distro.result == 'success'
      && needs.build-beacon-distro.outputs.image != ''
    permissions:
      contents: read # reusable workflow checkout
      packages: write # push vuln attestation to GHCR
      security-events: write # upload SARIF results
      id-token: write # keyless cosign attestation signing
    uses: complytime/org-infra/.github/workflows/reusable_trivy_image_scan.yml@638b2037394ca0f0b860a135c7c27dce75fd3c03 # v0.5.0
    with:
      image_ref: ${{ needs.build-beacon-distro.outputs.image_ref }}
      image_digest: ${{ needs.build-beacon-distro.outputs.digest }}
      trivy_severity: HIGH,CRITICAL

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 3: SIGN AND VERIFY (keyless signing with Sigstore)
  # ═══════════════════════════════════════════════════════════════════════════
  sign-beacon-distro:
    # The reusable workflow gates signing on `github.ref_protected`, so this stage
    # is a no-op (skipped) on unprotected refs such as PR branches.
    name: Sign Beacon Distro Image (protected refs only)
    needs: [build-beacon-distro, scan-image-beacon-distro]
    if: >-
      always()
      && needs.build-beacon-distro.result == 'success'
      && needs.build-beacon-distro.outputs.image != ''
      && needs.build-beacon-distro.outputs.digest != ''
      && (needs.scan-image-beacon-distro.result == 'success' || needs.scan-image-beacon-distro.result == 'skipped')
    permissions:
      packages: write # attach signature to image
      id-token: write # OIDC for keyless signing
    uses: complytime/org-infra/.github/workflows/reusable_sign_and_verify.yml@bbd7194995388f96dd28c0c0792d406c8a249140 # v0.4.0
    with:
      image_name: ${{ needs.build-beacon-distro.outputs.image }}
      digest: ${{ needs.build-beacon-distro.outputs.digest }}
      allowed_identity_regex: https://github.com/complytime/org-infra(/.*)?
      # Only verify vuln attestation when the image scan ran and attached one.
      # The reusable workflow defaults verify_vuln to true, which fails when the
      # scan was skipped and no vuln attestation exists on the image.
      verify_vuln: ${{ needs.scan-image-beacon-distro.result == 'success' }}

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 4: INTEGRATION TEST (validates published image)
  # ═══════════════════════════════════════════════════════════════════════════
  # Tests the published GHCR image to ensure it works correctly
  test-published-image:
    name: Test Published Image
    needs: [build-beacon-distro, sign-beacon-distro]
    if: >-
      always()
      && needs.build-beacon-distro.result == 'success'
      && needs.build-beacon-distro.outputs.image != ''
      && (needs.sign-beacon-distro.result == 'success' || needs.sign-beacon-distro.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout source for tests
      packages: read # pull GHCR image for testing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x
          repo-token: ${{ github.token }}

      - name: Test GHCR image
        env:
          USE_GHCR_IMAGE: "true"
          GHCR_IMAGE_REF: ${{ needs.build-beacon-distro.outputs.image_ref }}
          COMPOSE_CMD: "docker compose"
          WEBHOOK_PORT: "8088"
          LOKI_PORT: "3100"
          RUSTFS_PORT: "9000"
          COMPASS_PORT: "8081"
          CI: "true"
        run: |
          export GHCR_IMAGE="${GHCR_IMAGE_REF%%:*}"
          export GHCR_TAG="${GHCR_IMAGE_REF##*:}"
          echo "Testing published image: ${GHCR_IMAGE}:${GHCR_TAG}"
          task integration:test PROFILE=base

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 4b: PROMOTE TO QUAY (unstable tag for main branch builds)
  # ═══════════════════════════════════════════════════════════════════════════
  promote-unstable-quay:
    name: Promote Unstable to Quay
    needs: [build-beacon-distro, sign-beacon-distro, check-quay-secrets]
    if: >-
      always()
      && needs.build-beacon-distro.result == 'success'
      && needs.sign-beacon-distro.result == 'success'
      && needs.check-quay-secrets.outputs.has_quay_creds == 'true'
      && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    permissions:
      packages: read # pull source image from GHCR
      id-token: write # OIDC for keyless cosign signing on destination
    uses: complytime/org-infra/.github/workflows/reusable_publish_quay.yml@638b2037394ca0f0b860a135c7c27dce75fd3c03 # v0.5.0
    with:
      source_registry: ghcr.io
      source_image: complytime/complybeacon-beacon-distro
      source_tag: sha-${{ github.sha }}
      dest_registry: quay.io
      dest_image: complytime/beacon-collector
      dest_tag: unstable
      include_sha_tags: false
      allowed_identity_regex: https://github.com/complytime/org-infra(/.*)?
      fail_if_dest_exists: false
    secrets:
      dest_username: ${{ secrets.QUAY_USERNAME }}
      dest_password: ${{ secrets.QUAY_PASSWORD }}

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 5: SUMMARY (provides unified status)
  # ═══════════════════════════════════════════════════════════════════════════
  summary:
    name: Pipeline Summary
    needs:
      [
        build-beacon-distro,
        scan-image-beacon-distro,
        sign-beacon-distro,
        test-published-image,
        promote-unstable-quay,
      ]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: none # no checkout needed; only writes GITHUB_STEP_SUMMARY
    steps:
      - name: Generate Summary
        env:
          R_B2: ${{ needs.build-beacon-distro.result }}
          R_S2: ${{ needs.scan-image-beacon-distro.result }}
          R_G2: ${{ needs.sign-beacon-distro.result }}
          R_TEST: ${{ needs.test-published-image.result }}
          R_QUAY: ${{ needs.promote-unstable-quay.result }}
        run: |
          icon() { case "$1" in success) echo "✅";; skipped) echo "⏭️";; *) echo "❌";; esac; }

          BUILD_TAG="sha-$GITHUB_SHA"

          {
            cat << EOF
          ## 🚀 Production Build

          | Stage | Beacon Distro |
          |-------|---------------|
          | Build | $(icon "$R_B2") |
          | Image Scan | $(icon "$R_S2") |
          | Sign | $(icon "$R_G2") |
          | Integration Test | $(icon "$R_TEST") |
          | Quay Unstable | $(icon "$R_QUAY") |
          EOF

            if [[ "$R_B2" == "skipped" ]]; then
              echo "❌ **Build was skipped — pipeline did not produce an image.**"
              exit 1
            fi

            if [[ "$R_B2" != "success" && "$R_B2" != "skipped" ]]; then
              echo "⚠️ **One or more components failed.**"
              exit 1
            fi

            if [[ "$R_TEST" != "success" && "$R_TEST" != "skipped" ]]; then
              echo "⚠️ **Integration tests failed.**"
              exit 1
            fi

            # Catch-all: any required stage that genuinely failed (not an intentional
            # skip) must turn the summary red. Without this, a failed signing step or
            # image scan would fall through to the success block and report false green.
            # Quay promotion is excluded — it is best-effort and should not block the pipeline.
            for stage_result in "$R_B2" "$R_S2" "$R_G2" "$R_TEST"; do
              if [[ "$stage_result" == "failure" || "$stage_result" == "cancelled" ]]; then
                echo "❌ **A required pipeline stage failed (result: ${stage_result}). See the failed job above.**"
                exit 1
              fi
            done

            cat << EOF

          ✅ **Pipeline completed successfully.**

          ### 🔒 Security & Quality Checks
          - ✅ CI tests passed (quality gate)
          - ✅ Secret scanning
          - ✅ Vulnerability scanning (source — via ci_security.yml)
          EOF

            # Only claim stages passed if they actually ran successfully
            if [[ "$R_S2" == "success" ]]; then
              echo "- ✅ Vulnerability scanning (image)"
            else
              echo "- ⏭️ Vulnerability scanning (image) - skipped"
            fi

            if [[ "$R_G2" == "success" ]]; then
              echo "- ✅ SBOM generated"
              echo "- ✅ Provenance attestation"
              echo "- ✅ Image signed and verified"
            else
              echo "- ⏭️ SBOM, provenance, and signing - skipped for dev builds"
            fi

            if [[ "$R_TEST" == "success" ]]; then
              echo "- ✅ Integration tests passed (GHCR image validated)"
            else
              echo "- ⏭️ Integration tests - skipped"
            fi

            cat << EOF

          ### 📦 Published Images
          - **Tag**: \`${BUILD_TAG}\`
          EOF

            if [[ "$R_QUAY" == "success" ]]; then
              echo "- **Quay**: \`quay.io/complytime/beacon-collector:unstable\`"
            elif [[ "$R_QUAY" == "skipped" ]]; then
              echo "- **Quay**: skipped (not a main branch build or Quay credentials not configured)"
            else
              echo "- **Quay**: ⚠️ promotion failed (non-blocking)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 6: PRUNE OLD IMAGES (cleanup after successful publish)
  # ═══════════════════════════════════════════════════════════════════════════
  prune-old-images:
    name: Prune Old GHCR Images
    needs: [build-beacon-distro, sign-beacon-distro]
    if: >-
      always()
      && needs.build-beacon-distro.result == 'success'
      && (needs.sign-beacon-distro.result == 'success' || needs.sign-beacon-distro.result == 'skipped')
    permissions:
      packages: write # required by ci_prune_ghcr.yml to delete package versions
    uses: ./.github/workflows/ci_prune_ghcr.yml
