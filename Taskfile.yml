version: "3"

# pipefail: without this, `go test | tee` always exits 0 (tee's exit code)
# even when tests fail, silently masking failures. Must be set here in the
# root Taskfile — Taskfile v3 silently ignores file-level `set:` in included
# taskfiles (.taskfiles/*.yml).
set: [pipefail]

env:
  GOTOOLCHAIN: auto

includes:
  dev:
    taskfile: .taskfiles/dev.yml
  codegen:
    taskfile: .taskfiles/codegen.yml
  infra:
    taskfile: .taskfiles/infra.yml
  version:
    taskfile: .taskfiles/version.yml
  quality:
    taskfile: .taskfiles/quality.yml
  integration:
    taskfile: .taskfiles/integration.yml
  tools:
    taskfile: .taskfiles/tools.yml

vars:
  APP_NAME: '{{.APP_NAME | default "complybeacon"}}'
  TEST_DIR: '{{.TEST_DIR | default ".test-output"}}'
  MODULES: "./proofwatch ./truthbeam"
  BIN_DIR: '{{.BIN_DIR | default "bin"}}'
  CERT_DIR: '{{.CERT_DIR | default "certs"}}'

tasks:
  default:
    silent: true
    cmd: |
      task --list

  test:
    desc: "Alias for dev:test"
    cmds:
      - task: dev:test

  test-race:
    desc: "Alias for dev:test-race"
    cmds:
      - task: dev:test-race

  lint:
    desc: "Alias for dev:lint"
    cmds:
      - task: dev:lint

  mega-lint:
    desc: "Alias for dev:mega-lint"
    cmds:
      - task: dev:mega-lint

  mega-lint-fix:
    desc: "Alias for dev:mega-lint-fix"
    cmds:
      - task: dev:mega-lint-fix

  deps:
    desc: "Alias for dev:deps"
    cmds:
      - task: dev:deps

  workspace:
    desc: "Alias for dev:workspace"
    cmds:
      - task: dev:workspace

  build:
    desc: "Alias for infra:build"
    cmds:
      - task: infra:build

  release-prep:
    desc: "Validate release readiness (VERSION=x.y.z)"
    cmds:
      - task: dev:release-prep
        vars:
          VERSION: "{{.VERSION | default .CLI_ARGS}}"

  check:
    desc: Run all quality gates
    deps: [lint, test]

  clean:
    desc: Remove build artifacts and test output
    cmds:
      - rm -rf {{.BIN_DIR}} {{.TEST_DIR}}
      - GOFLAGS= go clean -modcache

  test:integration:
    desc: "Run integration tests (all layers, or PROFILE=base|storage|enrichment)"
    cmds:
      - task: integration:test
