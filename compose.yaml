version: "3"
services:
  loki:
    image: "docker.io/grafana/loki:3.5.1"
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./configs/loki.yaml:/etc/loki/local-config.yaml:z
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: "docker.io/grafana/grafana:11.6.0"
    profiles: [debug]
    environment:
      - GF_FEATURE_TOGGLES_ENABLE=grafanaManagedRecordingRules
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    ports:
      - "${GRAFANA_PORT:-3000}:3000/tcp"
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Loki
          type: loki
          access: proxy
          orgId: 1
          url: 'http://loki:3100'
          basicAuth: false
          isDefault: true
          version: 1
          editable: true
        EOF
        /run.sh

  rustfs:
    image: "docker.io/rustfs/rustfs@sha256:d441111efe3af5bbd6e29eba7cd124f96bb7d49a0612390907f9216d5f970382" # v1.0.0-beta.3
    profiles: [storage]
    environment:
      - RUSTFS_ACCESS_KEY=${AWS_ACCESS_KEY_ID:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
    ports:
      - "${RUSTFS_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs-data:/data
      - rustfs-logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  rustfs-tls:
    image: "docker.io/rustfs/rustfs@sha256:d441111efe3af5bbd6e29eba7cd124f96bb7d49a0612390907f9216d5f970382" # v1.0.0-beta.3
    profiles: [storage-tls]
    environment:
      - RUSTFS_ACCESS_KEY=${AWS_ACCESS_KEY_ID:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      - RUSTFS_CERT_FILE=/certs/rustfs.crt
      - RUSTFS_CERT_KEY_FILE=/certs/rustfs.key
    ports:
      - "${RUSTFS_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs-data:/data
      - rustfs-logs:/logs
      - ./certs:/certs:z
    healthcheck:
      test:
        ["CMD", "curl", "-sf", "https://localhost:9000/health", "--insecure"]
      interval: 5s
      timeout: 3s
      retries: 5

  rustfs-init:
    image: "docker.io/rustfs/rc@sha256:ca85fbee9f96425446915cb08b41d5e246c782eeb3f6a00d3b8294fce5219891"
    profiles: [storage]
    depends_on:
      - rustfs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until rc alias set local http://rustfs:9000 $$AWS_ACCESS_KEY_ID $$AWS_SECRET_ACCESS_KEY 2>/dev/null; do
          echo "waiting for rustfs..."
          sleep 2
        done
        rc mb --ignore-existing local/$$S3_BUCKETNAME
        # SECURITY: Limited anonymous access for integration tests only
        # RustFS test bucket configured with anonymous public access so
        # tests can query S3 ListObjectsV2 via plain HTTP
        rc anonymous set public local/$$S3_BUCKETNAME
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-rustfsadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      - S3_BUCKETNAME=${S3_BUCKETNAME:-complybeacon-evidence}
    restart: "no"

  rustfs-init-tls:
    image: "docker.io/rustfs/rc@sha256:ca85fbee9f96425446915cb08b41d5e246c782eeb3f6a00d3b8294fce5219891"
    profiles: [storage-tls]
    depends_on:
      - rustfs-tls
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Wait for TLS endpoint
        until rc alias set local https://rustfs-tls:9000 $$AWS_ACCESS_KEY_ID $$AWS_SECRET_ACCESS_KEY --insecure 2>/dev/null; do
          echo "waiting for rustfs-tls..."
          sleep 2
        done
        rc mb --ignore-existing local/$$S3_BUCKETNAME --insecure
        # NO ANONYMOUS ACCESS: TLS tests use authenticated rc client calls
        echo "TLS bucket configured with authenticated access only"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-rustfsadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      - S3_BUCKETNAME=${S3_BUCKETNAME:-complybeacon-evidence}
    restart: "no"

  compass:
    image: complybeacon/mock-compass:latest
    build:
      context: ./tests/integration/mock-compass
      dockerfile: Containerfile
    profiles: [enrichment]
    volumes:
      - ./tests/integration/fixtures/compass-responses.json:/fixtures/compass-responses.json:z
      - ./certs:/certs:z
    ports:
      - "${COMPASS_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "/mock-compass", "-healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 5

  collector:
    image: complybeacon/collector:latest
    build:
      context: .
      dockerfile: beacon-distro/Containerfile.collector
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-rustfsadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      - S3_BUCKETNAME=${S3_BUCKETNAME:-complybeacon-evidence}
      - S3_OBJ_DIR=${S3_OBJ_DIR:-evidence}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://rustfs:9000}
      - S3_DISABLE_SSL=${S3_DISABLE_SSL:-true}
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./${COLLECTOR_CONFIG:-configs/collector-base.yaml}:/etc/otel-collector.yaml:z
      - ./data:/data:z,U
      - ./certs:/certs:z
    ports:
      - "${OTLP_PORT:-4317}:4317"
      - "${WEBHOOK_PORT:-8088}:8088"

  collector-tls:
    image: complybeacon/collector:latest
    build:
      context: .
      dockerfile: beacon-distro/Containerfile.collector
    profiles: [storage-tls]
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-rustfsadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      - S3_BUCKETNAME=${S3_BUCKETNAME:-complybeacon-evidence}
      - S3_OBJ_DIR=${S3_OBJ_DIR:-evidence}
      - S3_ENDPOINT=${S3_ENDPOINT:-https://rustfs-tls:9000}
      - S3_DISABLE_SSL=${S3_DISABLE_SSL:-false}
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./${COLLECTOR_CONFIG:-configs/collector-storage-tls.yaml}:/etc/otel-collector.yaml:z
      - ./data:/data:z,U
      - ./certs:/certs:z
    ports:
      - "${OTLP_PORT:-4317}:4317"
      - "${WEBHOOK_PORT:-8088}:8088"

volumes:
  rustfs-data:
  rustfs-logs:
