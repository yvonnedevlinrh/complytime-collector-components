version: "3"
services:
  loki:
    image: "docker.io/grafana/loki:3.5.1"
    ports:
      - "3100:3100"
    volumes:
      - ./hack/demo/loki-config.yaml:/etc/loki/local-config.yaml:Z
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: "docker.io/grafana/grafana:11.6.0"
    environment:
      - GF_FEATURE_TOGGLES_ENABLE=grafanaManagedRecordingRules
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    ports:
      - "3000:3000/tcp"
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Loki
          type: loki
          access: proxy
          orgId: 1
          url: 'http://loki:3100'
          basicAuth: false
          isDefault: true
          version: 1
          editable: true
        EOF
        /run.sh

  rustfs:
    image: "docker.io/rustfs/rustfs:latest"
    environment:
      - RUSTFS_ACCESS_KEY=${AWS_ACCESS_KEY_ID:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs-data:/data
      - rustfs-logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  rustfs-init:
    image: "docker.io/rustfs/rc:latest"
    depends_on:
      - rustfs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until rc alias set local http://rustfs:9000 $$AWS_ACCESS_KEY_ID $$AWS_SECRET_ACCESS_KEY 2>/dev/null; do
          echo "waiting for rustfs..."
          sleep 2
        done
        rc mb --ignore-existing local/$$S3_BUCKETNAME
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-rustfsadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      - S3_BUCKETNAME=${S3_BUCKETNAME:-complybeacon-evidence}
    restart: "no"

  collector:
    build:
      context: ./beacon-distro
      dockerfile: Containerfile.collector
    depends_on:
      - rustfs-init
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-rustfsadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      - S3_BUCKETNAME=${S3_BUCKETNAME:-complybeacon-evidence}
      - S3_OBJ_DIR=${S3_OBJ_DIR:-evidence}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://rustfs:9000}
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./hack/demo/demo-config.yaml:/etc/otel-collector.yaml:Z
      - ./data:/data:Z
    ports:
      - "4317:4317"
      - "8088:8088"

volumes:
  rustfs-data:
  rustfs-logs:
