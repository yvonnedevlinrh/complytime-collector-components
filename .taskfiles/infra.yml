version: "3"

vars:
  CERT_DIR: '{{.CERT_DIR | default (printf "%s/certs" .ROOT_DIR)}}'
  OPENSSL_CNF: "{{.ROOT_DIR}}/configs/openssl.cnf"
  IMAGE: '{{.IMAGE | default "complybeacon/collector"}}'
  TAG: '{{.TAG | default "latest"}}'
  # Environment-based image selection
  USE_GHCR_IMAGE: '{{.USE_GHCR_IMAGE | default "false"}}'
  GHCR_IMAGE: '{{.GHCR_IMAGE | default "ghcr.io/complytime/complybeacon-beacon-distro"}}'
  GHCR_TAG: '{{.GHCR_TAG | default (env "GITHUB_SHA" | printf "sha-%s")}}'

tasks:
  default:
    silent: true
    cmd: task infra --list

  build:
    desc: Build the beacon collector container image (only if not using GHCR)
    status:
      - test "{{.USE_GHCR_IMAGE}}" = "true"
    cmds:
      - 'echo "Building local image: {{.IMAGE}}:{{.TAG}}"'
      - task: :dev:deps
      - task: :version:sync
      - podman build -f beacon-distro/Containerfile.collector -t {{.IMAGE}}:{{.TAG}} {{.ROOT_DIR}}

  generate-self-signed-cert:
    desc: Generate self-signed certificates for compass, truthbeam, and rustfs
    cmds:
      - rm -rf {{.CERT_DIR}} && mkdir -p {{.CERT_DIR}}
      - echo "--- Generating self-signed certificates in {{.CERT_DIR}} ---"
      - openssl genrsa -out {{.CERT_DIR}}/truthbeam.key 2048
      - cmd: |
          openssl req -x509 -new -nodes -key {{.CERT_DIR}}/truthbeam.key -sha256 -days 365 \
            -subj "/CN=ComplyBeacon Root CA" \
            -extensions v3_ca -config {{.OPENSSL_CNF}} \
            -out {{.CERT_DIR}}/truthbeam.crt
      - openssl genrsa -out {{.CERT_DIR}}/compass.key 2048
      - openssl req -new -key {{.CERT_DIR}}/compass.key -out {{.CERT_DIR}}/compass.csr -config {{.OPENSSL_CNF}}
      - cmd: |
          openssl x509 -req -in {{.CERT_DIR}}/compass.csr -CA {{.CERT_DIR}}/truthbeam.crt -CAkey {{.CERT_DIR}}/truthbeam.key -CAcreateserial \
            -out {{.CERT_DIR}}/compass.crt -days 365 -sha256 \
            -extfile {{.OPENSSL_CNF}} -extensions v3_req
      - openssl genrsa -out {{.CERT_DIR}}/rustfs.key 2048
      - cmd: |
          openssl req -new -key {{.CERT_DIR}}/rustfs.key -out {{.CERT_DIR}}/rustfs.csr \
            -subj "/C=US/ST=California/L=San Francisco/O=ComplyBeacon/OU=Dev/CN=rustfs-tls"
      - cmd: |
          # Create temporary extension file for RustFS certificate
          cat > {{.CERT_DIR}}/rustfs_ext.cnf << EOF
          [v3_req]
          subjectAltName = @alt_names
          basicConstraints = CA:FALSE

          [alt_names]
          DNS.1 = rustfs-tls
          DNS.2 = localhost
          IP.1 = 127.0.0.1
          EOF
          openssl x509 -req -in {{.CERT_DIR}}/rustfs.csr -CA {{.CERT_DIR}}/truthbeam.crt -CAkey {{.CERT_DIR}}/truthbeam.key -CAcreateserial \
            -out {{.CERT_DIR}}/rustfs.crt -days 365 -sha256 \
            -extensions v3_req -extfile {{.CERT_DIR}}/rustfs_ext.cnf
          rm {{.CERT_DIR}}/rustfs_ext.cnf
      - chmod 644 {{.CERT_DIR}}/*.key
      - echo "--- Certificates generated successfully ---"

  deploy:
    desc: Deploy infra (builds image unless using GHCR)
    cmds:
      - task: :version:sync
      - task: build
        vars:
          { USE_GHCR_IMAGE: "{{.USE_GHCR_IMAGE}}", GHCR_TAG: "{{.GHCR_TAG}}" }
      - |
        if [[ "{{.USE_GHCR_IMAGE}}" == "true" ]]; then
          echo "Using GHCR image: {{.GHCR_IMAGE}}:{{.GHCR_TAG}}"
          COLLECTOR_IMAGE={{.GHCR_IMAGE}}:{{.GHCR_TAG}} podman-compose -f compose.yaml -f compose.ghcr.yaml up
        else
          echo "Using locally built image"
          podman-compose -f compose.yaml up
        fi

  undeploy:
    desc: Undeploy container stack — DESTRUCTIVE
    prompt: This will tear down the container stack. Are you sure?
    cmd: podman-compose -f compose.yaml down -v

  deploy-with-ghcr:
    desc: Deploy using GHCR image (for CI/testing)
    vars:
      GHCR_TAG_INPUT: "{{.GHCR_TAG_INPUT | default .GHCR_TAG}}"
    cmds:
      - task: deploy
        vars:
          USE_GHCR_IMAGE: "true"
          GHCR_TAG: "{{.GHCR_TAG_INPUT}}"

  test-with-ghcr:
    desc: Run tests using GHCR image
    vars:
      GHCR_TAG_INPUT: "{{.GHCR_TAG_INPUT | default .GHCR_TAG}}"
    cmds:
      - task: deploy-with-ghcr
        vars:
          GHCR_TAG_INPUT: "{{.GHCR_TAG_INPUT}}"
      - task: :dev:test
      - defer: { task: undeploy }
